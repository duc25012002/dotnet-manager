services:
  # 1. C# ASP.NET Core Backend (Web Service)
  - type: web
    name: hr-backend
    runtime: docker
    dockerfilePath: HRManagementSystem/Dockerfile
    dockerContext: HRManagementSystem
    plan: free
    envVars:
      - key: PORT
        value: "8080"
      - key: ConnectionStrings__DefaultConnection
        sync: false # User enters their free PostgreSQL connection string (Supabase, Neon, etc.) here
      - key: GEMINI_API_KEY
        sync: false
      - key: ASPNETCORE_ENVIRONMENT
        value: Production

  # 2. React Frontend (Web Service)
  - type: web
    name: hr-frontend
    runtime: docker
    dockerfilePath: hr-frontend/Dockerfile
    dockerContext: hr-frontend
    plan: free
    envVars:
      - key: PORT
        value: "3000"
      - key: BACKEND_URL
        sync: false # User enters the public URL of hr-backend (e.g., https://hr-backend.onrender.com)
      - key: NGINX_ENVSUBST_FILTER
        value: "BACKEND_URL"
