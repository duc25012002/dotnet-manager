services:
  # 1. C# ASP.NET Core Backend (Web Service - Free, No Docker)
  - type: web
    name: hr-backend
    runtime: go
    plan: free
    buildCommand: bash build-backend.sh
    startCommand: ./publish/HRManagementSystem --urls http://0.0.0.0:$PORT
    envVars:
      - key: ConnectionStrings__DefaultConnection
        sync: false # User enters their free PostgreSQL connection string (Supabase, Neon, Aiven, etc.) here
      - key: GEMINI_API_KEY
        sync: false
      - key: ASPNETCORE_ENVIRONMENT
        value: Production

  # 2. React Frontend (Static Site - Free, No Docker)
  - type: web
    name: hr-frontend
    runtime: static
    rootDir: hr-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false # User enters the public URL of hr-backend (e.g., https://hr-backend.onrender.com)
