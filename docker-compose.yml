
services:
  hr-sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hr-sqlserver
    platform: linux/amd64
    user: root
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd' -C -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd' -Q 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  hr-backend:
    build:
      context: ./HRManagementSystem
      dockerfile: Dockerfile
    container_name: hr-backend
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=hr-sqlserver,1433;Database=HRManagementDB;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      hr-sqlserver:
        condition: service_healthy
    restart: always

  hr-frontend:
    build:
      context: ./hr-frontend
      dockerfile: Dockerfile
    container_name: hr-frontend
    ports:
      - "3000:3000"
    depends_on:
      - hr-backend
    restart: always


